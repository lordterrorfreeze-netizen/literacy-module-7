<!DOCTYPE html>
<html>
<head>
    <title>DORK-LAB: High Score Protocol</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background: #050505; user-select: none; }
        canvas { display: block; cursor: crosshair; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff00; text-shadow: 2px 2px #000; pointer-events: none; z-index: 10; }
        .stat { font-size: 18px; margin-bottom: 8px; background: rgba(0,25,0,0.9); padding: 10px 18px; border-left: 5px solid #00ff00; border-radius: 0 15px 15px 0; min-width: 200px; }
        
        /* High Score Highlight */
        #hi-score-val { color: #f1c40f; font-weight: bold; }
        #difficulty-val { color: #e74c3c; font-weight: bold; }
        
        #notif { font-size: 26px; color: #ff00ff; font-weight: bold; margin-top: 20px; text-transform: uppercase; }
        #admin-tag { position: absolute; bottom: 15px; right: 20px; color: rgba(0,255,0,0.2); font-size: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat">Current Score: <span id="score">0</span></div>
        <div class="stat">BEST RUN: <span id="hi-score-val">0</span></div>
        <div class="stat">DIFFICULTY: <span id="difficulty-val">100%</span></div>
        <div id="notif"></div>
    </div>
    <div id="admin-tag">V7.0_HARDCORE_BYPASS_ENABLED</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI Elements
const scoreEl = document.getElementById('score');
const hiScoreEl = document.getElementById('hi-score-val');
const diffEl = document.getElementById('difficulty-val');
const notifEl = document.getElementById('notif');

// Game Variables
let score = 0;
let hiScore = localStorage.getItem('dorkHiScore') || 0;
let gameOver = false;
let infiniteMode = false;
let frame = 0;
let lastDifficultyUpdate = 0;

// Physics & Difficulty
let gameSpeed = 5.5;
let gravity = 0.42;
let spawnRate = 1400; // ms
let lastSpawnTime = 0;
let difficultyLevel = 100;

// Ball/Dork Object
let ball = { x: 100, y: 0, radius: 19, velocity: 0, jump: -8.4 };
let hoops = [];

hiScoreEl.innerHTML = hiScore;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if(!gameOver) ball.y = canvas.height / 2;
}
window.addEventListener('resize', resize);
resize();

function updateUI() {
    scoreEl.innerHTML = infiniteMode ? "∞" : score;
    diffEl.innerHTML = difficultyLevel + "%";
    
    // Auto-unlock Void Dork at 500 or Inf
    if (score >= 500 || infiniteMode) {
        if (notifEl.innerHTML === "") {
            notifEl.innerHTML = "VOID ENTITY UNLOCKED";
            setTimeout(() => notifEl.innerHTML = "", 3000);
        }
    }
}

function draw(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;

    // 1. Difficulty Scaling (Every 2 Seconds)
    if (timestamp - lastDifficultyUpdate > 2000 && !gameOver) {
        gameSpeed *= 1.045; // Increase speed
        gravity *= 1.01;    // Slight gravity increase
        spawnRate = Math.max(500, 1400 / (gameSpeed / 5.5));
        difficultyLevel = Math.round((gameSpeed / 5.5) * 100);
        updateUI();
        lastDifficultyUpdate = timestamp;
    }

    // 2. Background Grid
    ctx.strokeStyle = "#0d1117";
    ctx.lineWidth = 2;
    for(let i=0; i<canvas.width; i+=60) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=60) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

    // 3. Spawn Logic
    if (timestamp - lastSpawnTime > spawnRate && !gameOver) {
        const gap = 220;
        const h = Math.floor(Math.random()*(canvas.height - gap - 200)) + 100;
        hoops.push({x: canvas.width, top: h, passed: false});
        lastSpawnTime = timestamp;
    }

    // 4. Draw Dork/Ball
    ctx.save();
    if (score >= 500 || infiniteMode) {
        let s = 1 + Math.sin(frame * 0.15) * 0.3;
        ctx.translate(ball.x, ball.y); ctx.scale(s, s); ctx.translate(-ball.x, -ball.y);
        ctx.shadowBlur = 40; ctx.shadowColor = "#ff00ff";
        ctx.fillStyle = "#000";
    } else {
        ctx.fillStyle = "#ff8c00";
    }
    
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
    
    // Eyes
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(ball.x+8, ball.y-5, 4, 0, Math.PI*2); ctx.arc(ball.x-3, ball.y-5, 4, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 5. Hoop Movement & Collision
    if (!gameOver) {
        ball.velocity += gravity;
        ball.y += ball.velocity;

        for (let i = 0; i < hoops.length; i++) {
            let h = hoops[i];
            h.x -= gameSpeed;
            
            // Draw Pillars
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(h.x, 0, 80, h.top);
            ctx.fillRect(h.x, h.top + 220, 80, canvas.height);
            
            // Rims
            ctx.fillStyle = "#e67e22";
            ctx.fillRect(h.x-5, h.top-8, 90, 8);
            ctx.fillRect(h.x-5, h.top+220, 90, 8);

            // Scoring
            if (!h.passed && ball.x > h.x + 80) {
                score++;
                updateUI();
                h.passed = true;
            }

            // Hitbox (Circle vs Rect)
            if (ball.x + 15 > h.x && ball.x - 15 < h.x + 80) {
                if (ball.y - 15 < h.top || ball.y + 15 > h.top + 220) gameOver = true;
            }
        }

        if (ball.y + 18 > canvas.height || ball.y - 18 < 0) gameOver = true;
        hoops = hoops.filter(h => h.x > -150);
        requestAnimationFrame(draw);
    } else {
        // 6. Game Over Screen
        if (score > hiScore && !infiniteMode) {
            hiScore = score;
            localStorage.setItem('dorkHiScore', hiScore);
            hiScoreEl.innerHTML = hiScore;
        }

        ctx.fillStyle = "rgba(0,0,0,0.95)";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "#ff0000"; ctx.font = "bold 42px Courier New";
        ctx.fillText("SYSTEM CRITICAL", canvas.width/2 - 180, canvas.height/2);
        ctx.fillStyle = "white"; ctx.font = "20px Courier New";
        ctx.fillText("FINAL SCORE: " + (infiniteMode ? "∞" : score), canvas.width/2 - 90, canvas.height/2 + 60);
        ctx.fillText("BEST SCORE: " + hiScore, canvas.width/2 - 80, canvas.height/2 + 95);
        ctx.fillText("CLICK TO REBOOT", canvas.width/2 - 85, canvas.height/2 + 160);
    }
}

// Controls
window.addEventListener('mousedown', () => {
    if(gameOver) {
        score = 0; gameSpeed = 5.5; gravity = 0.42; infiniteMode = false;
        difficultyLevel = 100; hoops = []; gameOver = false;
        ball.y = canvas.height / 2; ball.velocity = 0;
        updateUI();
        requestAnimationFrame(draw);
    } else {
        ball.velocity = ball.jump;
    }
});

// The Hacker Bypass (Ctrl + /)
window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === '/') {
        e.preventDefault();
        infiniteMode = true;
        score = 999999;
        updateUI();
        notifEl.innerHTML = "ADMIN OVERRIDE: INF SCORE";
        setTimeout(() => notifEl.innerHTML = "", 3000);
    }
});

requestAnimationFrame(draw);
</script>
</body>
</html>
